name: Deploy Next.js to Pages
on:
  push:
    branches: [ main ]

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm install
      - run: npm run build  # 关键：必须生成 out

      - uses: upload-pages-artifact@v3
        with:
          path: ./out  # 路径完全正确